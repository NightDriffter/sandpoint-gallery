<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandpoint — City Cards</title>
    <style>
        /* ========== MAIN STYLES ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a1920 0%, #0d2b2e 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 30px 20px;
            color: #eee;
        }
        .city-container { max-width: 1400px; margin: 0 auto; }
        .city-header { text-align: center; margin-bottom: 45px; }
        .city-header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(255,215,0,0.3);
        }
        .city-header p { color: #FFD700; font-size: 1rem; letter-spacing: 1px; opacity: 0.9; }
        .stacks-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; margin-top: 20px; }
        .stack-column {
            flex: 1; min-width: 360px;
            background: rgba(10, 25, 32, 0.6);
            border-radius: 28px; padding: 24px 18px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .stack-title {
            text-align: center; font-size: 1.4rem; font-weight: 600;
            margin-bottom: 25px; padding-bottom: 10px;
            border-bottom: 2px solid #FFD700;
            display: inline-block; width: 100%; color: #FFD700;
        }
        .stack-title span {
            background: #FFD700; color: #0a1920;
            padding: 4px 12px; border-radius: 30px;
            font-size: 0.8rem; margin-left: 10px; font-weight: bold;
        }
        .stack-player { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0; }
        .arrow-btn {
            background: rgba(30, 50, 45, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
            color: #FFD700; font-size: 24px; font-weight: 300;
            backdrop-filter: blur(4px);
        }
        .arrow-btn:hover { background: #FFD700; color: #0a1920; border-color: #FFD700; transform: scale(1.05); }
        .arrow-btn:active { transform: scale(0.95); }
        .stack-area { position: relative; width: 280px; height: 210px; cursor: pointer; flex-shrink: 0; }
        .stack-card {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 14px; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: #1a2a2a; border: 1px solid rgba(255, 215, 0, 0.15);
            backface-visibility: hidden; user-select: none;
        }
        .stack-card.pos-0 { transform: rotate(-5deg) translateX(-5px) translateY(-3px); z-index: 1; }
        .stack-card.pos-1 { transform: rotate(3deg) translateX(4px) translateY(-1px); z-index: 2; }
        .stack-card.pos-2 { transform: rotate(-2deg) translateX(-2px) translateY(1px); z-index: 3; }
        .stack-card.pos-3 { transform: rotate(4deg) translateX(5px) translateY(3px); z-index: 4; }
        .stack-card.pos-4 { transform: rotate(-3deg) translateX(-4px) translateY(5px); z-index: 5; }
        .stack-area:hover .stack-card { box-shadow: 0 12px 28px rgba(0,0,0,0.5); }
        .stack-area:hover .stack-card.pos-0 { transform: translateX(-22px) translateY(-8px) rotate(-8deg) scale(1.02); z-index: 10; }
        .stack-area:hover .stack-card.pos-1 { transform: translateX(-6px) translateY(-12px) rotate(-3deg) scale(1.02); z-index: 9; }
        .stack-area:hover .stack-card.pos-2 { transform: translateX(0px) translateY(-14px) rotate(0deg) scale(1.02); z-index: 8; }
        .stack-area:hover .stack-card.pos-3 { transform: translateX(6px) translateY(-9px) rotate(3deg) scale(1.02); z-index: 7; }
        .stack-area:hover .stack-card.pos-4 { transform: translateX(20px) translateY(-4px) rotate(6deg) scale(1.02); z-index: 6; }
        .stack-card:hover {
            transform: translateX(0) translateY(-28px) rotate(0deg) scale(1.07) !important;
            z-index: 20 !important;
            box-shadow: 0 22px 38px rgba(0,0,0,0.6);
            transition: all 0.25s ease-out;
        }
        .stack-card img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
        .stack-card .card-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 25px 8px 8px; color: white;
            font-size: 11px; font-weight: 500; text-align: center; pointer-events: none;
        }
        .navigation-hint { text-align: center; font-size: 10px; color: #FFD700; opacity: 0.6; margin-top: 15px; letter-spacing: 0.5px; }
        .modal-stack {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .modal-stack.active { display: flex; }
        .modal-stack img { max-width: 90%; max-height: 85%; border-radius: 12px; object-fit: contain; }
        .modal-stack .modal-caption {
            position: absolute; bottom: 20px; left: 0; right: 0;
            text-align: center; color: #FFD700;
            background: rgba(0,0,0,0.7); padding: 12px; font-size: 15px;
        }
        @media (max-width: 900px) {
            .stack-area { width: 240px; height: 180px; }
            .arrow-btn { width: 38px; height: 38px; font-size: 18px; }
            .stack-column { min-width: 320px; }
        }
        @media (max-width: 800px) {
            .stacks-wrapper { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

<div class="city-container">
    <div class="city-header">
        <h1>🌊🏄 Sandpoint 🏖️☀️</h1>
        <p>A sun-kissed haven for surfers and dreamers.</p>
    </div>
    <div class="stacks-wrapper">
        <!-- LEFT STACK: DISTRICTS (18 cards) -->
        <div class="stack-column">
            <div class="stack-title">🏄‍♂️🌴 Districts <span>18</span></div>
            <div class="stack-player">
                <div class="arrow-btn" id="districtsPrev">◀</div>
                <div class="stack-area" id="districtsStack"></div>
                <div class="arrow-btn" id="districtsNext">▶</div>
            </div>
            <div class="navigation-hint">🖱️ Click / scroll / swipe / arrows → flip cards</div>
        </div>
        <!-- RIGHT STACK: POINTS OF INTEREST (13 cards) -->
        <div class="stack-column">
            <div class="stack-title">📍✨ Points of Interest <span>13</span></div>
            <div class="stack-player">
                <div class="arrow-btn" id="placesPrev">◀</div>
                <div class="stack-area" id="placesStack"></div>
                <div class="arrow-btn" id="placesNext">▶</div>
            </div>
            <div class="navigation-hint">🖱️ Click / scroll / swipe / arrows → flip cards</div>
        </div>
    </div>
</div>

<!-- MODAL WINDOW -->
<div id="modalStack" class="modal-stack">
    <img id="modalStackImage" src="">
    <div class="modal-caption" id="modalStackCaption"></div>
</div>

<script>
    // ========== DISTRICTS DATA (18 cards) ==========
    const districtsData = [
        { thumb: "images/Districts/Civic Center.png", full: "images/Districts/Civic Center.png", label: "🏢 Civic Center – Administrative district" },
        { thumb: "images/Districts/Westgate Industrial Park.png", full: "images/Districts/Westgate Industrial Park.png", label: "🏭 Westgate Industrial Park – Clean industry" },
        { thumb: "images/Districts/Cliffside Estates.png", full: "images/Districts/Cliffside Estates.png", label: "🏘️ Cliffside Estates – Gated community" },
        { thumb: "images/Districts/Coastal Plaza.png", full: "images/Districts/Coastal Plaza.png", label: "🏙️ Coastal Plaza – Modern hub" },
        { thumb: "images/Districts/The Boardwalk.png", full: "images/Districts/The Boardwalk.png", label: "🎡 The Boardwalk – Tourist promenade" },
        { thumb: "images/Districts/Harborview.png", full: "images/Districts/Harborview.png", label: "🏙️ Harborview – Urban apartments" },
        { thumb: "images/Districts/Old Sandpoint.png", full: "images/Districts/Old Sandpoint.png", label: "🏛️ Old Sandpoint – Historic core" },
        { thumb: "images/Districts/Pacific Heights.png", full: "images/Districts/Pacific Heights.png", label: "🏡 Pacific Heights – Prestigious homes" },
        { thumb: "images/Districts/Sunswept Bay.png", full: "images/Districts/Sunswept Bay.png", label: "🏰 Sunswept Bay – Upscale villas" },
        { thumb: "images/Districts/Seagull Nest.png", full: "images/Districts/Seagull Nest.png", label: "🏘️ Seagull Nest – Family-friendly neighborhood" },
        { thumb: "images/Districts/Whispering Pines.png", full: "images/Districts/Whispering Pines.png", label: "🏡 Whispering Pines – Family suburb" },
        { thumb: "images/Districts/Maple Grove.png", full: "images/Districts/Maple Grove.png", label: "🍁 Maple Grove – Quiet streets" },
        { thumb: "images/Districts/Redwood Gateway.png", full: "images/Districts/Redwood Gateway.png", label: "🌲 Redwood Gateway – Nature's threshold" },
        { thumb: "images/Districts/Redwood National Reserve2.png", full: "images/Districts/Redwood National Reserve2.png", label: "🌲 Redwood National Reserve – Protected wilderness" },
        { thumb: "images/Districts/Driftwood Shores.png", full: "images/Districts/Driftwood Shores.png", label: "🏄 Driftwood Shores – Youthful beaches" },
        { thumb: "images/Districts/The Crossroads.png", full: "images/Districts/The Crossroads.png", label: "🛣️ The Crossroads – Highway entrance" },
        { thumb: "images/Districts/the Spills.png", full: "images/Districts/the Spills.png", label: "🏭 The Spills – Industrial decay" },
        { thumb: "images/Districts/Sandpoint Docks.png", full: "images/Districts/Sandpoint Docks.png", label: "⚓ Sandpoint Docks – Working port" }
    ];

    // ========== POINTS OF INTEREST DATA (13 cards) ==========
    const placesData = [
        { thumb: "images/PoI/Aphrodite's Touch.png", full: "images/PoI/Aphrodite's Touch.png", label: "💄 Aphrodite's Touch – Artisan perfumery" },
        { thumb: "images/PoI/Coastal Fitness & Surf Club.png", full: "images/PoI/Coastal Fitness & Surf Club.png", label: "💪 Coastal Fitness & Surf Club – Premium complex" },
        { thumb: "images/PoI/Prometheus Biosolutions.png", full: "images/PoI/Prometheus Biosolutions.png", label: "🧬 Prometheus Biosolutions – Cutting-edge research" },
        { thumb: "images/PoI/Salty Pete's Seafood.png", full: "images/PoI/Salty Pete's Seafood.png", label: "🐟 Salty Pete's Seafood – Abandoned warehouse" },
        { thumb: "images/PoI/Sandpoint Coast High School.png", full: "images/PoI/Sandpoint Coast High School.png", label: "🏫 Sandpoint Coast High School – Main school" },
        { thumb: "images/PoI/Sandpoint Fire Station #1.png", full: "images/PoI/Sandpoint Fire Station #1.png", label: "🚒 Sandpoint Fire Station #1 – Central firehouse" },
        { thumb: "images/PoI/Sandpoint PD.png", full: "images/PoI/Sandpoint PD.png", label: "👮 Sandpoint PD – Police headquarters" },
        { thumb: "images/PoI/St. Catherine's Medical Center.png", full: "images/PoI/St. Catherine's Medical Center.png", label: "🏥 St. Catherine's Medical Center – Main hospital" },
        { thumb: "images/PoI/The Last Call.png", full: "images/PoI/The Last Call.png", label: "🥃 The Last Call – Gloomy dive" },
        { thumb: "images/PoI/The Rustic Tap.png", full: "images/PoI/The Rustic Tap.png", label: "🍻 The Rustic Tap – Ranger pub" },
        { thumb: "images/PoI/The Witching Hour.png", full: "images/PoI/The Witching Hour.png", label: "🔮 The Witching Hour – Bass-heavy club" },
        { thumb: "images/PoI/Tides Arena.png", full: "images/PoI/Tides Arena.png", label: "🏟️ Tides Arena – Sports venue" },
        { thumb: "images/PoI/Unstable Beans.png", full: "images/PoI/Unstable Beans.png", label: "☕ Unstable Beans – Quirky café" }
    ];

    // ========== UNIVERSAL CARD STACK CLASS ==========
    class CardStack {
        constructor(stackAreaId, prevBtnId, nextBtnId, data) {
            this.stackArea = document.getElementById(stackAreaId);
            this.prevBtn = document.getElementById(prevBtnId);
            this.nextBtn = document.getElementById(nextBtnId);
            this.data = data;
            this.currentIndex = 0;
            this.totalCards = data.length;
            this.init();
        }
        init() {
            this.renderStack();
            this.prevBtn.addEventListener('click', (e) => { e.stopPropagation(); this.prevCard(); });
            this.nextBtn.addEventListener('click', (e) => { e.stopPropagation(); this.nextCard(); });
            this.stackArea.addEventListener('click', () => this.nextCard());
            this.stackArea.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY > 0) this.nextCard(); else this.prevCard();
            });
            let startX = 0, isDragging = false;
            this.stackArea.addEventListener('mousedown', (e) => {
                startX = e.clientX; isDragging = true; this.stackArea.style.cursor = 'grabbing';
            });
            window.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false; this.stackArea.style.cursor = 'pointer';
                const diff = e.clientX - startX;
                if (Math.abs(diff) > 40) { if (diff > 0) this.prevCard(); else this.nextCard(); }
            });
            this.stackArea.addEventListener('mouseleave', () => { isDragging = false; this.stackArea.style.cursor = 'pointer'; });
        }
        renderStack() {
            this.stackArea.innerHTML = '';
            for (let offset = 4; offset >= 0; offset--) {
                const cardIndex = (this.currentIndex - offset + this.totalCards) % this.totalCards;
                const card = this.data[cardIndex];
                const cardDiv = document.createElement('div');
                cardDiv.className = `stack-card pos-${offset}`;
                cardDiv.innerHTML = `<img src="${card.thumb}" alt="${card.label}"><div class="card-label">${card.label}</div>`;
                cardDiv.addEventListener('click', (e) => { e.stopPropagation(); this.openFullscreen(card.full, card.label); });
                this.stackArea.appendChild(cardDiv);
            }
        }
        nextCard() { this.currentIndex = (this.currentIndex + 1) % this.totalCards; this.renderStack(); }
        prevCard() { this.currentIndex = (this.currentIndex - 1 + this.totalCards) % this.totalCards; this.renderStack(); }
        openFullscreen(fullUrl, label) {
            const modal = document.getElementById('modalStack');
            const modalImg = document.getElementById('modalStackImage');
            const modalCaption = document.getElementById('modalStackCaption');
            modalImg.src = fullUrl; modalCaption.textContent = label; modal.classList.add('active');
        }
    }

    const districtsStack = new CardStack('districtsStack', 'districtsPrev', 'districtsNext', districtsData);
    const placesStack = new CardStack('placesStack', 'placesPrev', 'placesNext', placesData);

    const modal = document.getElementById('modalStack');
    modal.addEventListener('click', () => { modal.classList.remove('active'); document.getElementById('modalStackImage').src = ''; });

    let activeStack = districtsStack;
    document.querySelectorAll('.stack-column').forEach(col => {
        col.addEventListener('mouseenter', () => {
            if (col.querySelector('.stack-area')?.id === 'districtsStack') activeStack = districtsStack;
            else if (col.querySelector('.stack-area')?.id === 'placesStack') activeStack = placesStack;
        });
    });
    document.addEventListener('keydown', (e) => {
        if (modal.classList.contains('active')) { if (e.key === 'Escape') modal.classList.remove('active'); return; }
        if (e.key === 'ArrowLeft') activeStack.prevCard();
        if (e.key === 'ArrowRight') activeStack.nextCard();
    });
</script>
</body>
</html>
